<ul id="lezioni-lista"></ul>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh7dwRs1j7Vxib7OlB7mVRB-MNthAo5NA",
  authDomain: "peppe-ai-platform.firebaseapp.com",
  projectId: "peppe-ai-platform",
  storageBucket: "peppe-ai-platform.firebasestorage.app",
  messagingSenderId: "214462018633",
  appId: "1:214462018633:web:f224407eba3b107e27fb98"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 QUI CREIAMO LA LISTA AUTOMATICA
async function caricaLezioni() {
  const querySnapshot = await getDocs(collection(db, "lezioni"));

  const lista = document.getElementById("lezioni-lista");
  lista.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const li = document.createElement("li");
    const link = document.createElement("a");

    link.href = data.pdf;
    link.target = "_blank";
    link.textContent = data.Titolo;

    li.appendChild(link);
    lista.appendChild(li);
  });
}

caricaLezioni();
</script>
